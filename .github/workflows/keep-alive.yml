name: Keep HF Space Alive

# Ping every 5 minutes to prevent Hugging Face Space from sleeping
on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:        # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://berserk3142-drone-security-analyst.hf.space/health" \
            --max-time 30 || true)
          echo "Health check response: $response"
          if [ "$response" = "200" ]; then
            echo "✅ Space is alive"
          else
            echo "⚠️ Space returned $response — it may be waking up"
          fi
